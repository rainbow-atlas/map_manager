<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var redirectTo = window.location.origin +
          '/?__gh_path=' +
          encodeURIComponent(
            window.location.pathname + window.location.search + window.location.hash
          );
        window.location.replace(redirectTo);
      })();
    </script>
  </head>
  <body></body>
</html>
