name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        # Tailwind v4 uses an OS/CPU-specific optional native binding ("oxide").
        # npm's optional-deps handling can break when a lockfile created on a different
        # platform is reused in CI. Force a fresh install without the lockfile.
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-package-lock
      
      # Vite inlines env at build time. Add matching names under repo → Settings → Secrets → Actions.
      # Optional secrets may be omitted; the app falls back to defaults for map URLs when unset.
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_QUEER_MAP_EMBED_URL: ${{ secrets.VITE_QUEER_MAP_EMBED_URL }}
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 